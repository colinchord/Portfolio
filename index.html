<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Pages Test</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    color: #c9d1d9;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  h1 { margin-bottom: 1rem; }
  #box {
    width: 80px;
    height: 80px;
    background: #58a6ff;
    border-radius: 12px;
    position: relative;
  }
  p { margin-top: 2rem; opacity: 0.7; }
</style>
</head>
<body>
  <h1>It works! 🚀</h1>
  <div id="box"></div>
  <p>If this box is bouncing, GitHub Pages is live.</p>

  <script>
    const box = document.getElementById('box');
    let t = 0;
    function animate() {
      t += 0.03;
      const x = Math.sin(t) * 150;
      const y = Math.abs(Math.cos(t)) * -80;
      const hue = (t * 30) % 360;
      box.style.transform = `translate(${x}px, ${y}px) rotate(${t * 60}deg)`;
      box.style.background = `hsl(${hue}, 80%, 60%)`;
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
